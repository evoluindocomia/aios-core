template:
  id: story-template-v2
  name: Story Document
  version: 2.0
  output:
    format: markdown
    filename: docs/stories/{{epic_num}}.{{story_num}}.{{story_title_short}}.md
    title: 'Story {{epic_num}}.{{story_num}}: {{story_title_short}}'

workflow:
  mode: interactive
  elicitation: advanced-elicitation

agent_config:
  editable_sections:
    - Status
    - Story
    - Acceptance Criteria
    - Tasks / Subtasks
    - Dev Notes
    - Testing
    - Change Log

sections:
  - id: status
    title: Status
    type: choice
    choices: [Draft, Approved, InProgress, Review, Done]
    instruction: Selecionar o status atual da story
    owner: scrum-master
    editors: [scrum-master, dev-agent]

  - id: story
    title: Story
    type: template-text
    template: |
      **Como** {{role}},
      **quero** {{action}},
      **para** {{benefit}}
    instruction: Definir a user story usando o formato padrão com papel, ação e benefício
    elicit: true
    owner: scrum-master
    editors: [scrum-master]

  - id: acceptance-criteria
    title: Acceptance Criteria
    type: numbered-list
    instruction: Copiar a lista numerada de AC do arquivo do épico
    elicit: true
    owner: scrum-master
    editors: [scrum-master]

  - id: tasks-subtasks
    title: Tasks / Subtasks
    type: bullet-list
    instruction: |
      Decompor a story em tasks e subtasks específicas necessárias para implementação.
      Referenciar números de AC aplicáveis onde relevante.
    template: |
      - [ ] Task 1 (AC: # se aplicável)
        - [ ] Subtask1.1...
      - [ ] Task 2 (AC: # se aplicável)
        - [ ] Subtask 2.1...
      - [ ] Task 3 (AC: # se aplicável)
        - [ ] Subtask 3.1...
    elicit: true
    owner: scrum-master
    editors: [scrum-master, dev-agent]

  - id: dev-notes
    title: Dev Notes
    instruction: |
      Popular informações relevantes, apenas o que foi extraído de artefatos reais da pasta docs:
      - NÃO inventar informações
      - Se conhecido, adicionar info de Source Tree relevante para essa story
      - Se houve notas importantes de story anterior relevantes a esta, incluir aqui
      - Colocar informação suficiente para que o agente dev NUNCA precise ler documentos de arquitetura
    elicit: true
    owner: scrum-master
    editors: [scrum-master]
    sections:
      - id: testing-standards
        title: Testing
        instruction: |
          Listar Padrões de Teste Relevantes da Arquitetura que o Desenvolvedor precisa seguir:
          - Localização dos arquivos de teste
          - Padrões de teste
          - Frameworks e padrões de teste a usar
          - Requisitos específicos de teste para essa story
        elicit: true
        owner: scrum-master
        editors: [scrum-master]

  - id: change-log
    title: Change Log
    type: table
    columns: [Data, Versão, Descrição, Autor]
    instruction: Registrar mudanças feitas neste documento de story
    owner: scrum-master
    editors: [scrum-master, dev-agent, qa-agent]

  - id: dev-agent-record
    title: Dev Agent Record
    instruction: Esta seção é populada pelo agente de desenvolvimento durante a implementação
    owner: dev-agent
    editors: [dev-agent]
    sections:
      - id: agent-model
        title: Agent Model Used
        template: '{{agent_model_name_version}}'
        instruction: Registrar o modelo de agente IA específico e versão usado para desenvolvimento
        owner: dev-agent
        editors: [dev-agent]

      - id: debug-log-references
        title: Debug Log References
        instruction: Referenciar logs de debug ou traces gerados durante desenvolvimento
        owner: dev-agent
        editors: [dev-agent]

      - id: completion-notes
        title: Completion Notes List
        instruction: Notas sobre a conclusão das tasks e quaisquer issues encontradas
        owner: dev-agent
        editors: [dev-agent]

      - id: file-list
        title: File List
        instruction: Listar todos os arquivos criados, modificados ou afetados durante a implementação
        owner: dev-agent
        editors: [dev-agent]

  - id: qa-results
    title: QA Results
    instruction: Resultados do review de QA do agente @qa da implementação concluída
    owner: qa-agent
    editors: [qa-agent]
